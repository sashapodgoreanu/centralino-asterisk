services:
  postgres:
    image: postgres:17
    container_name: telephony-postgres
    environment:
      POSTGRES_USER: asterisk
      POSTGRES_PASSWORD: asterisk
      POSTGRES_DB: asterisk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asterisk -d asterisk"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-migrations:
    image: postgres:17
    container_name: telephony-postgres-migrations
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: asterisk
      POSTGRES_PASSWORD: asterisk
      POSTGRES_DB: asterisk
    volumes:
      - ./db/migrations:/migrations:ro
    command: ["sh", "/migrations/migrate.sh"]
    restart: "no"

  asterisk:
    build:
      context: .
      dockerfile: docker/asterisk/Dockerfile
    container_name: telephony-asterisk
    depends_on:
      postgres-migrations:
        condition: service_completed_successfully
    environment:
      ASTERISK_UID: 1000
      ASTERISK_GID: 1000
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
      - "8088:8088"
      - "8089:8089"
      - "5038:5038"
      - "10000-10010:10000-10010/udp"
    volumes:
      - ./asterisk:/etc/asterisk:ro
      - asterisk-keys:/etc/asterisk/keys
      - asterisk-spool:/var/spool/asterisk
      - asterisk-logs:/var/log/asterisk
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: telephony-backend
    depends_on:
      postgres-migrations:
        condition: service_completed_successfully
      asterisk:
        condition: service_started
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://asterisk:asterisk@postgres:5432/asterisk?schema=public
      ARI_URL: http://asterisk:8088
      ARI_USERNAME: app
      ARI_PASSWORD: appsecret
      ARI_APP: telephony-app
      AMI_HOST: asterisk
      AMI_PORT: 5038
      AMI_USERNAME: admin
      AMI_PASSWORD: adminsecret
      ASTERISK_MEDIA_ADDRESS: 192.168.0.52
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:3000
        VITE_WS_URL: http://localhost:3000
        VITE_SIP_WS_URL: ws://localhost:8088/ws
    container_name: telephony-frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: http://localhost:3000
      VITE_SIP_WS_URL: ws://localhost:8088/ws
    ports:
      - "5173:80"
    restart: unless-stopped

volumes:
  postgres-data:
  asterisk-keys:
  asterisk-spool:
  asterisk-logs:
